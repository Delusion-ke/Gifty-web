<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gifty Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{--p1:#7B61FF;--p3:#B388FF;--dk:#0B1020;--dk2:#10162A;--dk3:#181F35;--tx:#fff;--tx2:rgba(255,255,255,.62);--tx3:rgba(255,255,255,.35);--br:rgba(255,255,255,.07);--red:#FF6161}
    body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--dk);color:var(--tx);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
    .blob{position:fixed;border-radius:50%;filter:blur(140px);pointer-events:none;z-index:0}
    .b1{width:400px;height:400px;background:rgba(123,97,255,.08);top:-100px;left:-100px}
    .b2{width:300px;height:300px;background:rgba(179,136,255,.05);bottom:0;right:-60px}
    .card{position:relative;z-index:1;width:100%;max-width:500px;background:var(--dk2);border:1px solid var(--br);border-radius:24px;padding:40px}
    .logo{font-size:22px;font-weight:800;color:#fff;margin-bottom:8px}
    .logo span{color:var(--p3)}
    .subtitle{font-size:13px;color:var(--tx3);margin-bottom:28px}
    label{display:block;font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
    input,select{width:100%;background:var(--dk3);border:1px solid var(--br);border-radius:10px;padding:12px 14px;font-size:14px;color:#fff;font-family:inherit;outline:none;margin-bottom:16px;transition:border-color .2s}
    input:focus,select:focus{border-color:rgba(123,97,255,.4)}
    select option{background:var(--dk3)}
    .actions{display:flex;gap:10px;margin-top:4px}
    .btn{flex:1;padding:12px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .2s}
    .btn-check{background:var(--dk3);color:var(--p3);border:1px solid rgba(123,97,255,.3)}
    .btn-activate{background:var(--p1);color:#fff;border:none}
    .btn-deactivate{background:var(--red);color:#fff;border:none}
    .btn-logout{background:var(--dk3);color:var(--tx2);border:1px solid var(--br);width:100%;margin-top:20px}
    .btn:hover{opacity:.85}
    .btn:disabled{opacity:.4;cursor:not-allowed}
    .result{margin-top:20px;border-radius:12px;padding:16px;font-size:14px;line-height:1.6;display:none;white-space:pre-line}
    .result.success{background:rgba(123,97,255,.1);border:1px solid rgba(123,97,255,.2);color:var(--p3)}
    .result.error{background:rgba(255,97,97,.08);border:1px solid rgba(255,97,97,.2);color:#ff9999}
    .result.info{background:rgba(255,255,255,.04);border:1px solid var(--br);color:var(--tx2)}
    .divider{height:1px;background:var(--br);margin:24px 0}
    .badge{display:inline-flex;align-items:center;gap:6px;background:rgba(123,97,255,.1);border:1px solid rgba(123,97,255,.2);border-radius:100px;padding:4px 12px;font-size:11px;font-weight:600;color:var(--p3);margin-bottom:20px}
    #main-screen{display:none}
  </style>
</head>
<body>
<div class="blob b1"></div>
<div class="blob b2"></div>

<div class="card">
  <div class="logo">🎁 gifty <span>admin</span></div>

  <!-- LOGIN -->
  <div id="lock-screen">
    <p class="subtitle">Zadaj admin heslo pre prístup</p>
    <label>Admin heslo</label>
    <input type="password" id="login-password" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()"/>
    <button class="btn btn-activate" onclick="login()" style="width:100%">Prihlásiť sa</button>
    <div class="result" id="login-error"></div>
  </div>

  <!-- MAIN -->
  <div id="main-screen">
    <div class="badge">🔐 Admin panel</div>
    <p class="subtitle">Aktivuj alebo deaktivuj Premium pre používateľa podľa Gifty ID</p>

    <label>Gifty ID</label>
    <input type="text" id="gifty-id" placeholder="GIFTY-XXXX-XXXX"/>

    <label>Dĺžka Premium (pri aktivácii)</label>
    <select id="months">
      <option value="1">1 mesiac</option>
      <option value="3">3 mesiace</option>
      <option value="6">6 mesiacov</option>
      <option value="12" selected>12 mesiacov (1 rok)</option>
      <option value="24">24 mesiacov (2 roky)</option>
      <option value="120">Doživotne (10 rokov)</option>
    </select>

    <div class="actions">
      <button class="btn btn-check" onclick="doAction('check')">🔍 Overiť</button>
      <button class="btn btn-activate" onclick="doAction('activate')">✅ Aktivovať</button>
      <button class="btn btn-deactivate" onclick="doAction('deactivate')">❌ Deaktivovať</button>
    </div>

    <div class="result" id="result"></div>
    <div class="divider"></div>
    <button class="btn btn-logout" onclick="logout()">Odhlásiť sa</button>
  </div>
</div>

<script>
  let adminPassword = '';

  function login() {
    const pwd = document.getElementById('login-password').value;
    if (!pwd) return;
    adminPassword = pwd;
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('main-screen').style.display = 'block';
  }

  function logout() {
    adminPassword = '';
    document.getElementById('lock-screen').style.display = 'block';
    document.getElementById('main-screen').style.display = 'none';
    document.getElementById('login-password').value = '';
    document.getElementById('result').style.display = 'none';
  }

  document.addEventListener('DOMContentLoaded', () => {
    const input = document.getElementById('gifty-id');
    if (input) input.addEventListener('input', () => input.value = input.value.toUpperCase());
  });

  async function doAction(action) {
    const giftyId = document.getElementById('gifty-id').value.trim().toUpperCase();
    const months = document.getElementById('months').value;
    if (!giftyId) { showResult('Zadaj Gifty ID', 'error'); return; }

    document.querySelectorAll('.btn').forEach(b => b.disabled = true);
    showResult('Načítavam...', 'info');

    try {
      const res = await fetch('/api/admin-premium', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: adminPassword, giftyId, action, months })
      });
      const data = await res.json();

      if (res.ok && data.success) {
        let msg = data.message || 'OK';
        if (data.user) {
          msg += `\n\nMeno: ${data.user.name}\nEmail: ${data.user.email || '—'}\nGifty ID: ${data.user.giftyId}`;
          if (data.user.isPremium !== undefined) msg += `\nPremium: ${data.user.isPremium ? '✅ Aktívne' : '❌ Neaktívne'}`;
          if (data.user.premiumUntil) msg += `\nPlatné do: ${data.user.premiumUntil}`;
        }
        showResult(msg, 'success');
      } else {
        if (res.status === 401) { showResult('Nesprávne heslo', 'error'); logout(); }
        else showResult(data.error || 'Chyba', 'error');
      }
    } catch (e) {
      showResult('Sieťová chyba: ' + e.message, 'error');
    } finally {
      document.querySelectorAll('.btn').forEach(b => b.disabled = false);
    }
  }

  function showResult(msg, type) {
    const el = document.getElementById('result');
    el.textContent = msg;
    el.className = `result ${type}`;
    el.style.display = 'block';
  }
</script>
</body>
</html>
