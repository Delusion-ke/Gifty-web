<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gifty — Profil</title>
  <meta name="description" content="Pozri môj wishlist a prispej presne na to čo si prajem cez QR platbu."/>
  <meta property="og:title" content="Pozri môj Gifty wishlist 🎁"/>
  <meta property="og:description" content="Zabudni na obálky s peniazmi. Prispej presne na to čo si prajem — jedným skenovaním QR kódu priamo z tvojej banky."/>
  <meta property="og:image" content="https://gifty.cloud/og-image.png"/>
  <meta property="og:image:width" content="1200"/>
  <meta property="og:image:height" content="630"/>
  <meta property="og:type" content="website"/>
  <meta property="og:site_name" content="Gifty"/>
  <meta name="twitter:card" content="summary_large_image"/>
  <meta name="twitter:image" content="https://gifty.cloud/og-image.png"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --violet: #7B5CF5; --violet-light: #A78BFA; --violet-pale: rgba(123,92,245,.12);
      --violet-border: rgba(123,92,245,.22); --pink: #C084FC;
      --bg: #07091A; --surface: #0D1128; --surface2: #111630;
      --border: rgba(255,255,255,.07); --text: #F4F4FF; --muted: rgba(244,244,255,.45);
    }
    body {
      font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 32px 20px 48px;
      position: relative; overflow-x: hidden;
    }
    body::before {
      content: ''; position: fixed; top: -200px; left: 50%; transform: translateX(-50%);
      width: 700px; height: 700px;
      background: radial-gradient(circle, rgba(123,92,245,.18) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }
    .card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 28px;
      max-width: 420px; width: 100%; overflow: hidden; position: relative; z-index: 1;
      box-shadow: 0 32px 80px rgba(0,0,0,.55), 0 0 0 1px rgba(255,255,255,.04) inset;
      animation: cardIn .6s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes cardIn { from { opacity: 0; transform: translateY(24px) scale(.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
    .hero {
      position: relative; height: 220px;
      background: linear-gradient(145deg, #1A1040 0%, #0D0A2E 100%);
      display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    .hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 0%, rgba(123,92,245,.35) 0%, transparent 65%); }
    .hero-ring { position: absolute; border-radius: 50%; border: 1px solid rgba(123,92,245,.15); }
    .hero-ring:nth-child(1) { width: 200px; height: 200px; top: -60px; left: -60px; }
    .hero-ring:nth-child(2) { width: 140px; height: 140px; bottom: -40px; right: -30px; border-color: rgba(192,132,252,.12); }
    .hero-logo { position: relative; z-index: 2; animation: logoIn .8s .1s cubic-bezier(.22,1,.36,1) both; }
    @keyframes logoIn { from { opacity: 0; transform: scale(.85) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    .body { padding: 28px 24px 30px; }
    .badge {
      display: inline-flex; align-items: center; gap: 7px;
      background: var(--violet-pale); border: 1px solid var(--violet-border);
      border-radius: 100px; padding: 5px 13px 5px 8px; font-size: 12px;
      font-weight: 600; color: var(--violet-light); margin-bottom: 18px;
      animation: fadeUp .5s .25s both;
    }
    .badge-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--violet-light); box-shadow: 0 0 6px 2px rgba(167,139,250,.6); }
    .avatar-wrap {
      display: none; align-items: center; gap: 14px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 16px; padding: 14px; margin-bottom: 20px;
      animation: fadeUp .5s .3s both;
    }
    .avatar {
      width: 52px; height: 52px; border-radius: 50%;
      background: linear-gradient(135deg, var(--violet), var(--pink));
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 800; color: #fff; flex-shrink: 0;
    }
    .avatar-name { font-size: 16px; font-weight: 700; }
    .gifty-id-badge {
      display: none; align-items: center; gap: 5px;
      background: var(--violet-pale); border: 1px solid var(--violet-border);
      border-radius: 100px; padding: 3px 10px; font-size: 11px;
      font-weight: 600; color: var(--violet-light); margin-top: 4px;
    }
    .heading { font-size: 24px; font-weight: 800; line-height: 1.25; letter-spacing: -.4px; margin-bottom: 6px; animation: fadeUp .5s .35s both; }
    .heading em { font-style: normal; background: linear-gradient(90deg, var(--violet-light), var(--pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .desc { font-size: 14px; color: var(--muted); line-height: 1.65; margin-bottom: 24px; animation: fadeUp .5s .4s both; }
    .divider { height: 1px; background: var(--border); margin: 0 0 24px; }
    .btn-primary {
      display: flex; align-items: center; justify-content: center; gap: 9px;
      background: linear-gradient(135deg, var(--violet) 0%, var(--pink) 100%);
      color: #fff; text-decoration: none; padding: 15px 24px; border-radius: 14px;
      font-size: 15px; font-weight: 700; margin-bottom: 10px;
      box-shadow: 0 8px 28px rgba(123,92,245,.4);
      transition: transform .18s, box-shadow .18s;
      animation: fadeUp .5s .5s both; position: relative; overflow: hidden;
    }
    .btn-primary::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,255,255,.12), transparent 60%); }
    .btn-primary:hover { transform: translateY(-2px); }
    .store-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; animation: fadeUp .5s .55s both; }
    .btn-store {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      background: rgba(255,255,255,.055); border: 1px solid var(--border);
      color: var(--text); text-decoration: none; padding: 12px 14px;
      border-radius: 13px; font-size: 13px; font-weight: 600;
      transition: background .18s, transform .18s;
    }
    .btn-store:hover { background: rgba(255,255,255,.09); transform: translateY(-1px); }
    .footer { margin-top: 20px; font-size: 12px; color: rgba(255,255,255,.25); text-align: center; position: relative; z-index: 1; animation: fadeUp .5s .6s both; }
    .footer a { color: rgba(167,139,250,.6); text-decoration: none; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="hero">
      <div class="hero-ring"></div>
      <div class="hero-ring"></div>
      <div class="hero-logo">
        <img src="/weblogo.png" alt="Gifty" style="width:160px; mix-blend-mode:screen; filter:drop-shadow(0 8px 28px rgba(123,92,245,.5));"/>
      </div>
    </div>
    <div class="body">
      <div class="badge"><span class="badge-dot"></span>Gifty Wishlist</div>

      <div class="avatar-wrap" id="avatar-wrap">
        <div class="avatar" id="avatar-letter">?</div>
        <div>
          <div class="avatar-name" id="profile-name">Načítavam...</div>
          <div class="gifty-id-badge" id="gifty-id-badge">🎁 <span id="gifty-id-text"></span></div>
        </div>
      </div>

      <div class="heading"><em id="inviter-name">Niekto</em> zdieľa<br>svoj wishlist</div>
      <p class="desc">Zabudni na obálky s peniazmi, taška na víno a kvety čo zvädnú. Prispej presne na to čo si prajem — jedným skenovaním QR kódu priamo z tvojej banky.</p>

      <div class="divider"></div>

      <a href="#" id="open-app" class="btn-primary">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6M10 14L21 3M18 13v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h8"/></svg>
        Otvoriť v Gifty
      </a>
      <div class="store-row">
        <a href="https://apps.apple.com/app/gifty/id0000000000" class="btn-store">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="white"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
          App Store
        </a>
        <a href="https://play.google.com/store/apps/details?id=com.gifty.cloud" class="btn-store">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="white"><path d="M3.18 23.76c.3.17.64.24.99.19l12.6-7.27-2.79-2.79-10.8 9.87zM20.7 10.06L17.62 8.3l-3.12 3.12 3.12 3.12 3.11-1.77c.89-.5.89-1.71-.03-2.21zM2.05.46C1.73.98 1.55 1.62 1.55 2.36v19.32c0 .74.18 1.38.5 1.9l.1.09 10.82-10.82v-.25L2.05.46zM3.18.27l12.6 7.27-2.79 2.79L2.19.46c.32-.22.68-.28.99-.19z"/></svg>
          Google Play
        </a>
      </div>
    </div>
  </div>
  <div class="footer"><a href="https://gifty.cloud">gifty.cloud</a> &nbsp;·&nbsp; Celebrate together.</div>

  <script>
    const pathParts = window.location.pathname.split('/');
    const giftyId = pathParts[pathParts.length - 1];
    const openAppBtn = document.getElementById('open-app');
    if (giftyId) openAppBtn.href = `gifty://u/${giftyId}`;

    async function loadProfile() {
      if (!giftyId) return;
      try {
        const PROJECT_ID = 'gifty-f57bc';
        const res = await fetch(`https://firestore.googleapis.com/v1/projects/${PROJECT_ID}/databases/(default)/documents:runQuery`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            structuredQuery: {
              from: [{ collectionId: 'profiles' }],
              where: { fieldFilter: { field: { fieldPath: 'giftyId' }, op: 'EQUAL', value: { stringValue: giftyId } } },
              limit: 1
            }
          })
        });
        const data = await res.json();
        const doc = data?.[0]?.document;
        if (!doc) return;
        const f = doc.fields;
        const name = f?.name?.stringValue || 'Gifty používateľ';
        const gId = f?.giftyId?.stringValue || giftyId;

        document.getElementById('inviter-name').textContent = name;
        document.getElementById('profile-name').textContent = name;
        document.getElementById('avatar-letter').textContent = name.charAt(0).toUpperCase();
        document.getElementById('gifty-id-text').textContent = gId;
        document.getElementById('gifty-id-badge').style.display = 'inline-flex';
        document.getElementById('avatar-wrap').style.display = 'flex';
        document.title = `${name} — Gifty Wishlist`;
      } catch (e) {
        console.log('Profile load error:', e);
      }
    }
    loadProfile();
  </script>
</body>
</html>
