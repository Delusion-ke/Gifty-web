<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      width:1200px;height:630px;overflow:hidden;
      background:#0B1020;
      font-family:'Segoe UI',Arial,sans-serif;
      display:flex;align-items:center;justify-content:space-between;
      padding:60px 80px;
    }
    .left{display:flex;flex-direction:column;justify-content:center;max-width:620px}
    .badge{display:inline-flex;align-items:center;gap:8px;background:rgba(123,97,255,.15);border:1px solid rgba(123,97,255,.3);border-radius:100px;padding:6px 16px;font-size:14px;font-weight:600;color:#B388FF;margin-bottom:24px;width:fit-content}
    h1{font-size:64px;font-weight:800;line-height:1.05;letter-spacing:-2px;color:#fff;margin-bottom:16px}
    .g{background:linear-gradient(135deg,#7B61FF,#B388FF);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    p{font-size:20px;color:rgba(255,255,255,.6);line-height:1.5;max-width:520px}
    .right{display:flex;flex-direction:column;align-items:center;gap:16px}
    .icon-wrap{width:200px;height:200px;background:linear-gradient(135deg,rgba(123,97,255,.2),rgba(179,136,255,.1));border:2px solid rgba(123,97,255,.3);border-radius:40px;display:flex;align-items:center;justify-content:center}
    .features{display:flex;flex-direction:column;gap:10px}
    .feat{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:10px 16px;color:rgba(255,255,255,.75);font-size:15px;font-weight:600}
    .dot{width:8px;height:8px;border-radius:50%;background:#7B61FF;flex-shrink:0}
    .url{margin-top:24px;font-size:16px;color:rgba(255,255,255,.3);letter-spacing:1px}
  </style>
</head>
<body>
  <div class="left">
    <div class="badge">🎁 Celebrate together.</div>
    <h1>Gifty<br/><span class="g">Wishlist & Darčeky</span></h1>
    <p>Pozri môj wishlist a prispej presne na to čo si prajem — jedným skenovaním QR kódu priamo z tvojej banky.</p>
    <div class="url">gifty.cloud</div>
  </div>

  <div class="right">
    <div class="icon-wrap">
      <svg width="100" height="100" viewBox="0 0 28 28" fill="none">
        <defs>
          <linearGradient id="g1" x1="2" y1="2" x2="26" y2="26">
            <stop offset="0%" stop-color="#7B61FF"/>
            <stop offset="100%" stop-color="#B388FF"/>
          </linearGradient>
        </defs>
        <rect x="2.5" y="13" width="23" height="13" rx="3" stroke="url(#g1)" stroke-width="2"/>
        <rect x="5.5" y="8" width="17" height="6" rx="2" stroke="url(#g1)" stroke-width="2"/>
        <path d="M14 8C14 8 11.5 3.5 9 5.5C6.5 7.5 9 8 14 8C19 8 21.5 7.5 19 5.5C16.5 3.5 14 8 14 8Z" stroke="url(#g1)" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M11.5 20C11.5 20 13 22 14 20.5C15 19 14 17 12.5 18C11 19 11.5 20 11.5 20Z" fill="url(#g1)"/>
      </svg>
    </div>
    <div class="features">
      <div class="feat"><div class="dot"></div>Wishlist a priania</div>
      <div class="feat"><div class="dot"></div>QR platby na IBAN</div>
      <div class="feat"><div class="dot"></div>Skupinové darčeky</div>
      <div class="feat"><div class="dot"></div>Zadarmo</div>
    </div>
  </div>
</body>
</html>
